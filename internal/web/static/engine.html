<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ .Title }} - Engine</title>
  <link rel="stylesheet" href="/assets/common.css" />
  <link rel="stylesheet" href="{{ .AssetBase }}/engine.css" />
</head>
<body>
  <main class="page">
    <header class="page-header">
      <nav class="top-nav" aria-label="Navigation">
        <a href="/">Home</a>
        <a href="{{ .DashboardPath }}">Dashboard</a>
        <a href="{{ .EditorPath }}">Editor</a>
        <a href="{{ .ExplorePath }}">Explore</a>
        <a href="{{ .EnginePath }}" aria-current="page">Engine</a>
      </nav>
      <h1>Engine Inspector</h1>
      <p class="sub">Live operational view for databases, metrics, data files, WAL, and in-memory runtime pages.</p>
    </header>

    <section class="controls panel engine-toolbar">
      <div class="engine-toolbar-main">
        <label class="engine-db-control">
          <span>Database</span>
          <select id="dbSelect"></select>
        </label>
        <div class="tabs engine-tabs" role="tablist" aria-label="Engine views">
          <button type="button" class="tab engine-tab active" id="engine-tab-overview" role="tab" aria-selected="true" aria-controls="overviewPane" data-tab="overview">Overview</button>
          <button type="button" class="tab engine-tab" id="engine-tab-database" role="tab" aria-selected="false" aria-controls="databasePane" data-tab="database">Database</button>
          <button type="button" class="tab engine-tab" id="engine-tab-files" role="tab" aria-selected="false" aria-controls="filesPane" data-tab="files">Files</button>
          <button type="button" class="tab engine-tab" id="engine-tab-wal" role="tab" aria-selected="false" aria-controls="walPane" data-tab="wal">WAL</button>
          <button type="button" class="tab engine-tab" id="engine-tab-runtime" role="tab" aria-selected="false" aria-controls="runtimePane" data-tab="runtime">Runtime</button>
        </div>
        <button type="button" id="refreshBtn" class="engine-refresh-btn" title="Refresh current view" aria-label="Refresh current view">↻ <span>Refresh</span></button>
        <span id="status" class="engine-status" aria-live="polite"></span>
      </div>
    </section>

    <section id="overviewPane" class="panel pane" role="tabpanel" aria-labelledby="engine-tab-overview"></section>
    <section id="databasePane" class="panel pane" role="tabpanel" aria-labelledby="engine-tab-database" hidden></section>
    <section id="filesPane" class="panel pane" role="tabpanel" aria-labelledby="engine-tab-files" hidden></section>
    <section id="walPane" class="panel pane" role="tabpanel" aria-labelledby="engine-tab-wal" hidden></section>
    <section id="runtimePane" class="panel pane" role="tabpanel" aria-labelledby="engine-tab-runtime" hidden></section>
  </main>

  <script>window.NANOTDB_DASH_CONFIG = {{ .ConfigJSON }};</script>
  <script src="{{ .AssetBase }}/engine_app.js"></script>
</body>
</html>
