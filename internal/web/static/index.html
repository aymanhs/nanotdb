<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ .Title }} - Explore</title>
  <link rel="stylesheet" href="https://unpkg.com/uplot@1.6.31/dist/uPlot.min.css" />
  <link rel="stylesheet" href="/assets/common.css" />
  <link rel="stylesheet" href="{{ .AssetBase }}/styles.css" />
</head>
<body>
  <main class="page">
    <header class="page-header">
      <nav class="top-nav" aria-label="Navigation">
        <a href="/">Home</a>
        <a href="{{ .DashboardPath }}">Dashboard</a>
        <a href="{{ .EditorPath }}">Editor</a>
        <a href="{{ .ExplorePath }}">Explore</a>
        <a href="{{ .EnginePath }}">Engine</a>
      </nav>
      <h1>{{ .Title }}</h1>
      <p class="sub">Lightweight live view for NanoTDB metrics</p>
    </header>

    <section class="controls panel">
      <label>
        Database
        <select id="dbSelect"></select>
      </label>
      <label class="metric-picker-control">
        Metric Picker
        <div class="combo-row">
          <input id="metricInput" list="metricsOptions" placeholder="Type metric name" />
          <datalist id="metricsOptions"></datalist>
          <button type="button" id="addMetricBtn" class="secondary-btn">Add</button>
        </div>
      </label>
      <label>
        Window
        <select id="windowSelect">
          <option value="900">15m</option>
          <option value="3600" selected>1h</option>
          <option value="21600">6h</option>
          <option value="86400">24h</option>
        </select>
      </label>
      <label>
        Step
        <select id="stepSelect">
          <option value="10s">10s</option>
          <option value="30s" selected>30s</option>
          <option value="1m">1m</option>
          <option value="5m">5m</option>
        </select>
      </label>
      <label class="refresh-control">
        Refresh
        <div class="refresh-row">
          <button type="button" id="autoRefreshBtn" title="Pause auto refresh" aria-label="Pause auto refresh">⏸</button>
          <select id="refreshIntervalSelect" aria-label="Auto refresh interval">
            <option value="5">5s</option>
            <option value="10" selected>10s</option>
            <option value="15">15s</option>
            <option value="30">30s</option>
            <option value="60">1m</option>
          </select>
          <button type="button" id="refreshBtn" class="secondary-btn" title="Refresh now" aria-label="Refresh now">↻</button>
        </div>
      </label>
      <span id="status" aria-live="polite"></span>

      <div class="selected-row">
        <span class="selected-label">Selected Metrics</span>
        <div id="selectedMetrics" class="selected-metrics" aria-live="polite"></div>
      </div>
    </section>

    <section class="panel metrics-panel">
      <header class="section-head">
        <h2>Last Values</h2>
        <p>Latest sample per selected metric</p>
      </header>
      <div id="cards" class="cards"></div>
    </section>

    <section class="chart-wrap panel">
      <header class="section-head">
        <h2>Live Chart</h2>
        <p>Range view over selected window</p>
      </header>
      <div id="chart" class="chart-host" aria-live="polite"></div>
    </section>
  </main>

  <script>window.NANOTDB_DASH_CONFIG = {{ .ConfigJSON }};</script>
  <script src="https://unpkg.com/uplot@1.6.31/dist/uPlot.iife.min.js" defer></script>
  <script src="{{ .AssetBase }}/app.js" defer></script>
</body>
</html>
