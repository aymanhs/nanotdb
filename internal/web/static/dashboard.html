<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ .Title }}</title>
  <link rel="stylesheet" href="https://unpkg.com/uplot@1.6.31/dist/uPlot.min.css" />
  <link rel="stylesheet" href="/assets/common.css" />
  <link rel="stylesheet" href="{{ .AssetBase }}/dashboard.css" />
</head>
<body>
  <main class="page">
    <header class="page-header">
      <nav class="top-nav" aria-label="Navigation">
        <a href="/">Home</a>
        <a href="{{ .DashboardPath }}">Dashboard</a>
        <a href="{{ .EditorPath }}">Editor</a>
        <a href="{{ .ExplorePath }}">Explore</a>
        <a href="{{ .EnginePath }}">Engine</a>
      </nav>
      <h1 id="dashboard-title">{{ .Title }}</h1>
      <nav id="group-nav" class="group-nav"></nav>
    </header>

    <div id="widgets"></div>
  </main>

  <script id="dashboardConfig" type="application/json">{{ .ConfigJSON }}</script>
  <script src="https://unpkg.com/uplot@1.6.31/dist/uPlot.iife.min.js" defer></script>
  <script src="/assets/dashboard_utils.js" defer></script>
  <script src="{{ .AssetBase }}/dashboard_app.js" defer></script>
</body>
</html>
