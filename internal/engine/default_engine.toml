# NanoTDB Engine Configuration
#
# This file is loaded at startup from <root_data_dir>/engine.toml.
# It is created automatically the first time the engine starts.
# If a numeric limit is set to 0 or a negative value, NanoTDB falls back to
# the built-in default for that key.

[engine]
# HTTP listen address for the NanoTDB server (host:port).
# Example: ":8428", "127.0.0.1:8428", "0.0.0.0:8428".
listen = ":8428"

[web]
# Enable/disable the built-in lightweight dashboard.
# When enabled, dashboard is served from both "/" and the configured base_path.
enabled = true
# Primary dashboard route prefix.
# Example: "/dashboard" (recommended), "/ui"
base_path = "/dashboard"
# Explore route prefix (manual metric picker view).
explore_path = "/explore"
# Browser page title for the built-in dashboard.
title = "NanoTDB Dashboard"
# Automatic dashboard refresh period in seconds.
refresh_seconds = 10
# Dashboard configuration JSON file path.
# Relative paths are resolved against the engine root data directory.
dashboard_config = "dashboard.json"
# Optional UI asset/template override directory.
# When set, NanoTDB serves dashboard.html, index.html, dashboard_assets/, assets/,
# and common_assets/ from this directory instead of the embedded bundle.
# Relative paths are resolved against the engine root data directory.
web_root = ""
# Optional API base URL injected into the browser UI.
# Leave empty for same-origin requests. Set this when hosting the UI separately.
api_base_url = ""

[wal]
# Max WAL segment size in bytes.
# Larger values reduce segment rotations and fsync work, but increase
# per-segment disk usage.
max_segment_size = 67108864
# WAL fsync behavior:
# - "segment": fsync when a segment is sealed (better throughput).
# - "always": fsync every append (strongest write durability, highest latency).
fsync_policy = "segment"

[durability]
# Write durability profile for page/catalog flush behavior:
# - "strict": fsync page file and persist catalog on each flush (safest, highest latency)
# - "balanced": fsync page file on flush, defer catalog persistence
# - "throughput": no fsync on page flush and defer catalog persistence (fastest, more crash risk)
profile = "strict"

[logging]
# Configure one or more loggers with TOML array-of-tables syntax.
# `output = "console"` writes to the process console for service managers such as systemd.
# Any other output value is treated as a file path and opened in append mode.
# Levels use conventional ordering: info < debug < trace.

[[logging.logger]]
output = "console"
level = "info"

[stats]
# Enable/disable periodic internal engine metrics emission to the internal DB.
# This does not affect user data ingest; it only controls engine self-metrics.
enabled = true
# Metrics flush interval (Go duration format, e.g. "5s", "1m").
# "0s" is allowed and means stats are flushed whenever data is ingested.
interval = "30s"

[defaults]
# Databases to create at startup if they do not exist yet.
# The special internal DB name is ignored even if listed here.
# Example: ["prod", "dev"]
databases = []

# Default manifest values copied into manifest.toml for newly created databases.
# Existing databases keep their own manifest settings.
[manifest_defaults.retention]
# Retention grace window (Go duration).
# Stored in each database manifest and validated as a duration string.
# Use this to define your retention boundary grace policy.
grace = "5m"
# Number of full days of data to keep in on-disk data-YYYY-MM-DD.dat files.
retention_days = 30
# Max distinct open day-buckets kept active in memory during ingest/replay.
# Higher values support broader out-of-order arrival windows at higher memory cost.
max_active_days = 2
# Partition key granularity for data files: day | month | year | forever.
# - day: data-YYYY-MM-DD.dat (default, finest granularity)
# - month: data-YYYY-MM.dat
# - year: data-YYYY.dat
# - forever: data-forever.dat (single shard; retention cleanup cannot split by age)
partition = "day"

[manifest_defaults.wal]
# Enable/disable WAL usage for this database.
# If disabled, data durability depends on page flush timing only.
enabled = true
# Skip WAL for samples older than now-skip_before (Go duration).
# Useful for backfills where replay protection is less important.
skip_before = "1h"

[manifest_defaults.page]
# Max samples per in-memory page before it is flushed to disk.
max_records = 16000
# Approximate max encoded payload bytes per in-memory page before flush.
max_bytes = 127000
# Max age of samples in one in-memory page (Go duration) before page rollover.
max_age = "60s"

[manifest_defaults.rollups]
# Enable rollups by default for newly created DBs.
# Existing DB manifests are not rewritten.
enabled = false
# File used to store rollup checkpoints in source DB directories.
checkpoint_file = "rollup.checkpoints.log"
# Default grace used when rollup jobs do not define per-job grace.
default_grace = ""
# Default rollup interval for jobs that omit per-job interval.
default_interval = ""
# Default destination DB for jobs that omit destination_db.
default_destination_db = ""
# Default aggregates for jobs that omit aggregates.
# Allowed values: min, max, sum, avg, count.
default_aggregates = []
# Wildcard patterns excluded from selector-based jobs (supports *).
global_exclude_patterns = []

# ------------------------------------------------------------------------------
# Sample per-database rollup config (put in <root>/<db>/manifest.toml)
# ------------------------------------------------------------------------------
#
# Rollup jobs should be declared on the SOURCE database manifest.
# Destination databases may also define their own jobs for chained rollups.
# Auto-created rollup destination DBs use rollup-tuned manifests:
# - WAL disabled because rollups are derived and rebuildable.
# - partition = "month" for sub-daily rollups and "year" for daily-or-larger rollups.
# - page.max_age increased to reduce tiny sparse pages.
#
# Example source DB (for example: sensors/manifest.toml):
#
# [rollups]
# enabled = true
# checkpoint_file = "rollup.checkpoints.log"
# default_grace = "5m"
# default_interval = "1h"
# default_destination_db = "sensors_rollup_1h"
# default_aggregates = ["min", "max", "avg", "count"]
# global_exclude_patterns = ["nanotdb.*", "*.debug"]
#
# # Job id: unique within this source DB.
# # Selector-based jobs expand to per-metric checkpoint keys internally:
# #   <job-id>::<metric-name>
# [[rollups.jobs]]
# id = "all_metrics_1h"
# # Exactly one of source_metric or source_pattern must be set.
# source_pattern = "*"
# # Optional wildcard exclusions for this selector-based job.
# exclude_patterns = ["disk.sd_write_probe_ms", "net.*"]
# # interval / destination_db / aggregates may inherit from [rollups] defaults.
# # Output metric prefix defaults to the concrete source metric name.
#
# [[rollups.jobs]]
# id = "outside_temp_1h"
# # Explicit per-metric override job.
# source_metric = "temp.out_dry"
# interval = "1h"
# aggregates = ["min", "max", "sum", "avg", "count"]
# destination_db = "sensors_rollup_1h"
# destination_metric_prefix = "temp.out_dry"
# # Optional per-job grace override (otherwise uses default_grace/retention grace).
# grace = ""
#
# Example chained rollup (for example: sensors_rollup_1h/manifest.toml):
#
# [rollups]
# enabled = true
# checkpoint_file = "rollup.checkpoints.log"
# default_grace = "5m"
#
# [[rollups.jobs]]
# id = "outside_temp_1d_from_1h"
# source_metric = "temp.out_dry.sum"
# interval = "24h"
# aggregates = ["min", "max", "avg"]
# destination_db = "sensors_rollup_1d"
# destination_metric_prefix = "temp.out_dry"
